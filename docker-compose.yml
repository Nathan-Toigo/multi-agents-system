services:

  stock-service:
    build: ./stock-service
    container_name: stock-service
    ports:
      - "8001:8000"
    volumes:
      - ./stock-service/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  production-service:
    build: ./production-service
    container_name: production-service
    ports:
      - "8002:8000"
    volumes:
      - ./production-service/data:/app/data
